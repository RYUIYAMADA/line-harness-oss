<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE リッチメニュー — 選手家族チケット（日英バイリンガル）</title>
<style data-critical>
  :root {
    /* LINE Dev DS tokens — tokens.css :root 全量コピー */
    --color-line-green:         #06C755;
    --color-primary:            #06C755;
    --color-primary-hover:      #05A847;
    --color-bg:                 #FFFFFF;
    --color-bg-subtle:          #F5F5F5;
    --color-text:               #1A1A2E;
    --color-text-muted:         #6B7280;
    --color-text-on-primary:    #FFFFFF;
    --color-border:             #E5E7EB;
    --color-happinets-red:      #C8102E;
    --color-happinets-navy:     #152E58;
    --fw-regular:               400;
    --fw-medium:                500;
    --fw-bold:                  700;
    --spacing-1:                4px;
    --spacing-2:                8px;
    --spacing-3:                12px;
    --spacing-4:                16px;
    --spacing-5:                24px;
    --spacing-6:                32px;
    --spacing-7:                48px;
    --spacing-8:                64px;
    --radius-sm:                4px;
    --radius-md:                8px;
    --radius-lg:                16px;
    --radius-full:              9999px;
    --rich-menu-min-font-size:  24px;
    --rich-menu-tap-cell-min:   72px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #333;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 32px;
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  h1 {
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .meta {
    color: #aaa;
    font-size: 13px;
    margin-bottom: 16px;
    text-align: center;
  }

  /* Preview wrapper: scale-down for screen viewing */
  .preview-wrap {
    background: #fff;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  canvas#preview {
    display: block;
    /* Scale down for screen: 2500/4 = 625 */
    width: 625px;
    height: 421.5px;
  }

  canvas#export {
    display: none; /* Hidden; actual export size */
  }

  .actions {
    display: flex;
    gap: 12px;
  }

  button {
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
  }

  .btn-primary {
    background: var(--color-line-green);
    color: #fff;
  }

  .btn-secondary {
    background: #444;
    color: #fff;
  }

  #qa-overlay {
    display: none;
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.88);
    color: #fff;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 9999;
    max-width: 320px;
    line-height: 1.6;
  }

  #qa-overlay.pass { border-left: 4px solid #06C755; }
  #qa-overlay.fail { border-left: 4px solid #EF4444; }

  .qa-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .qa-item { margin: 4px 0; }
  .qa-ok  { color: #4ade80; }
  .qa-ng  { color: #f87171; }
</style>
</head>
<body>

<h1>LINE リッチメニュー — 選手家族チケット予約</h1>
<p class="meta">大サイズ: 2500 × 1686 px｜2カラム（左: 予約する/Reserve ／ 右: マイ申込状況/My Status）</p>

<div class="preview-wrap">
  <canvas id="preview" width="2500" height="1686"></canvas>
</div>

<div class="actions">
  <button class="btn-primary" onclick="downloadPNG()">PNG ダウンロード（2500×1686）</button>
  <button class="btn-secondary" onclick="runQA()">機械QA 実行</button>
</div>

<div id="qa-overlay">
  <div class="qa-title" id="qa-title">QA 結果</div>
  <div id="qa-body"></div>
</div>

<canvas id="export" width="2500" height="1686"></canvas>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DS Tokens (copied from tokens.json)
// ─────────────────────────────────────────────────────────────────────────────
const DS = {
  lineGreen:       '#06C755',
  happinetsNavy:   '#152E58',
  happinetsRed:    '#C8102E',
  bg:              '#FFFFFF',
  bgSubtle:        '#F5F5F5',
  text:            '#1A1A2E',
  textMuted:       '#6B7280',
  textOnPrimary:   '#FFFFFF',
  border:          '#E5E7EB',
};

// ─────────────────────────────────────────────────────────────────────────────
// RENDER — draw rich menu onto canvas
// W=2500, H=1686 (LINE spec: full size)
// ─────────────────────────────────────────────────────────────────────────────
function drawRichMenu(canvas) {
  const W = 2500;
  const H = 1686;
  const ctx = canvas.getContext('2d');

  // ── Background ──────────────────────────────────────────────────────────────
  ctx.fillStyle = DS.happinetsNavy;  // dark navy base
  ctx.fillRect(0, 0, W, H);

  // ── Subtle grid accent lines (very low opacity) ──────────────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 100) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 100) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // ── Divider line between left and right ─────────────────────────────────
  const divX = W / 2;  // 1250
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(divX, 40);
  ctx.lineTo(divX, H - 40);
  ctx.stroke();

  // ─────────────────────────────────────────────────────────────────────────
  // LEFT PANEL: 予約する / Reserve
  // ─────────────────────────────────────────────────────────────────────────
  drawPanel(ctx, {
    x: 0, y: 0, w: divX, h: H,
    accent: DS.lineGreen,
    iconType: 'ticket',
    labelJa: '予約する',
    labelEn: 'Reserve',
  });

  // ─────────────────────────────────────────────────────────────────────────
  // RIGHT PANEL: マイ申込状況 / My Status
  // ─────────────────────────────────────────────────────────────────────────
  drawPanel(ctx, {
    x: divX, y: 0, w: divX, h: H,
    accent: '#F59E0B',       // warm amber — distinct from green
    iconType: 'clipboard',
    labelJa: 'マイ申込状況',
    labelEn: 'My Status',
  });

  // ── Bottom brand strip ────────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, H - 80, W, 80);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '500 36px -apple-system, "Hiragino Sans", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('秋田ノーザンハピネッツ — 選手家族チケット', W / 2, H - 40);
}

// ─────────────────────────────────────────────────────────────────────────────
// drawPanel — one half-panel
// ─────────────────────────────────────────────────────────────────────────────
function drawPanel(ctx, { x, y, w, h, accent, iconType, labelJa, labelEn }) {
  const cx = x + w / 2;  // center x of this panel
  const cy = h / 2;

  // Hover-like highlight circle (very subtle)
  const grad = ctx.createRadialGradient(cx, cy - 60, 0, cx, cy - 60, 480);
  grad.addColorStop(0, `${accent}22`);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // ── Accent color bar at top ────────────────────────────────────────────────
  ctx.fillStyle = accent;
  ctx.fillRect(x + 60, y + 0, w - 120, 12);

  // ── Icon (monochrome line, SVG-on-canvas equivalent) ──────────────────────
  const iconY = cy - 180;
  const iconSize = 300;
  drawIcon(ctx, cx, iconY, iconSize, accent, iconType);

  // ── Japanese label ────────────────────────────────────────────────────────
  // Max chars: 7 (マイ申込状況) — must never clip at 2500×1686
  const jaSize = labelJa.length <= 5 ? 180 : 155;
  ctx.font = `700 ${jaSize}px -apple-system, "Hiragino Sans", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#FFFFFF';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 20;
  ctx.fillText(labelJa, cx, cy + 110);
  ctx.shadowBlur = 0;

  // ── English label ─────────────────────────────────────────────────────────
  const enSize = 90;
  ctx.font = `500 ${enSize}px -apple-system, "Hiragino Sans", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = `${accent}EE`;
  ctx.fillText(labelEn, cx, cy + 240);

  // ── Tap affordance: rounded rect button outline ───────────────────────────
  const btnW = w - 240;
  const btnH = 160;
  const btnX = x + 120;
  const btnY = cy + 280;
  roundRect(ctx, btnX, btnY, btnW, btnH, 40);
  ctx.strokeStyle = `${accent}99`;
  ctx.lineWidth = 6;
  ctx.stroke();

  // Arrow inside button
  const arrCx = cx;
  const arrCy = btnY + btnH / 2;
  ctx.fillStyle = accent;
  ctx.beginPath();
  ctx.moveTo(arrCx - 24, arrCy - 24);
  ctx.lineTo(arrCx + 24, arrCy);
  ctx.lineTo(arrCx - 24, arrCy + 24);
  ctx.closePath();
  ctx.fill();
}

// ─────────────────────────────────────────────────────────────────────────────
// drawIcon — monochrome line icons (ticket / clipboard)
// itshover style: thin stroke, no fill, single color
// ─────────────────────────────────────────────────────────────────────────────
function drawIcon(ctx, cx, cy, size, color, type) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = 'transparent';
  ctx.lineWidth = size * 0.065;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const s = size * 0.4;  // half-size for geometry

  if (type === 'ticket') {
    // Ticket: rectangle with notches on top and bottom center
    const tw = s * 2.2;
    const th = s * 1.4;
    const tx = cx - tw / 2;
    const tcy = cy;

    // Main body
    ctx.strokeRect(tx, tcy - th / 2, tw, th);

    // Notch circles (perforation style) — top and bottom center
    const notchR = th * 0.18;
    // Top notch
    ctx.beginPath();
    ctx.arc(cx, tcy - th / 2, notchR, 0, Math.PI, false);
    ctx.fillStyle = DS.happinetsNavy;
    ctx.fill();
    ctx.stroke();
    // Bottom notch
    ctx.beginPath();
    ctx.arc(cx, tcy + th / 2, notchR, Math.PI, 0, false);
    ctx.fill();
    ctx.stroke();

    // Dashed perforation line (vertical center)
    ctx.setLineDash([th * 0.08, th * 0.08]);
    ctx.beginPath();
    ctx.moveTo(cx, tcy - th / 2 + notchR * 1.5);
    ctx.lineTo(cx, tcy + th / 2 - notchR * 1.5);
    ctx.stroke();
    ctx.setLineDash([]);

    // Star / price area lines (left half)
    ctx.lineWidth = size * 0.04;
    ctx.beginPath();
    ctx.moveTo(tx + tw * 0.12, tcy - th * 0.22);
    ctx.lineTo(cx - tw * 0.08, tcy - th * 0.22);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tx + tw * 0.12, tcy);
    ctx.lineTo(cx - tw * 0.08, tcy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tx + tw * 0.12, tcy + th * 0.22);
    ctx.lineTo(cx - tw * 0.08, tcy + th * 0.22);
    ctx.stroke();

  } else if (type === 'clipboard') {
    // Clipboard: board with clip at top
    const bw = s * 1.8;
    const bh = s * 2.2;
    const bx = cx - bw / 2;
    const by = cy - bh / 2 + s * 0.2;
    const cr = bw * 0.1; // corner radius

    // Board body
    roundRect(ctx, bx, by, bw, bh, cr);
    ctx.strokeStyle = color;
    ctx.fillStyle = 'transparent';
    ctx.stroke();

    // Clip (U-shape at top)
    const clipW = bw * 0.42;
    const clipH = s * 0.55;
    const clipX = cx - clipW / 2;
    const clipY = by - clipH * 0.5;
    roundRect(ctx, clipX, clipY, clipW, clipH, clipH / 2);
    ctx.fillStyle = DS.happinetsNavy;
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.stroke();

    // Lines on board (list items)
    const lx1 = bx + bw * 0.15;
    const lx2 = bx + bw * 0.85;
    const ly0 = by + bh * 0.28;
    const gap = bh * 0.18;
    ctx.lineWidth = size * 0.05;
    for (let i = 0; i < 3; i++) {
      const ly = ly0 + gap * i;
      // Checkbox square
      const cbSize = bh * 0.1;
      ctx.strokeStyle = color;
      ctx.strokeRect(lx1, ly - cbSize / 2, cbSize, cbSize);
      // Check mark on first item
      if (i === 0) {
        ctx.lineWidth = size * 0.04;
        ctx.beginPath();
        ctx.moveTo(lx1 + cbSize * 0.15, ly + cbSize * 0.05);
        ctx.lineTo(lx1 + cbSize * 0.45, ly + cbSize * 0.3);
        ctx.lineTo(lx1 + cbSize * 0.9, ly - cbSize * 0.2);
        ctx.stroke();
        ctx.lineWidth = size * 0.05;
      }
      // Line next to checkbox
      ctx.beginPath();
      ctx.moveTo(lx1 + cbSize + bw * 0.06, ly);
      ctx.lineTo(i === 2 ? lx2 - bw * 0.15 : lx2, ly);
      ctx.stroke();
    }
  }

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// Utility: roundRect path
// ─────────────────────────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─────────────────────────────────────────────────────────────────────────────
// Init: draw on preview canvas
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const preview = document.getElementById('preview');
  drawRichMenu(preview);
  // Auto-run QA after render
  setTimeout(runQA, 300);
});

// ─────────────────────────────────────────────────────────────────────────────
// Download as PNG (actual 2500×1686)
// ─────────────────────────────────────────────────────────────────────────────
function downloadPNG() {
  const exportCanvas = document.getElementById('export');
  exportCanvas.width  = 2500;
  exportCanvas.height = 1686;
  drawRichMenu(exportCanvas);

  // Verify declared vs actual size
  const actualW = exportCanvas.width;
  const actualH = exportCanvas.height;
  if (actualW !== 2500 || actualH !== 1686) {
    alert(`❌ サイズ不一致: ${actualW}×${actualH} (期待: 2500×1686)`);
    return;
  }

  exportCanvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'hapinets-rich-menu-2500x1686.png';
    a.click();
    URL.revokeObjectURL(a.href);
  }, 'image/png');
}

// ─────────────────────────────────────────────────────────────────────────────
// QA Check
// ─────────────────────────────────────────────────────────────────────────────
function runQA() {
  const overlay = document.getElementById('qa-overlay');
  const body    = document.getElementById('qa-body');
  const title   = document.getElementById('qa-title');

  const checks = [];
  let ngCount = 0;

  // ── QA 1: Canvas actual size == declared size ─────────────────────────────
  const cv = document.getElementById('preview');
  const declW = cv.width;
  const declH = cv.height;
  // The CSS sets display size but canvas.width/height = actual pixels
  if (declW === 2500 && declH === 1686) {
    checks.push({ ok: true, label: '宣言=実サイズ一致 (2500×1686)' });
  } else {
    checks.push({ ok: false, label: `サイズ不一致: canvas ${declW}×${declH} ≠ 2500×1686` });
    ngCount++;
  }

  // ── QA 2: Canvas renders content (not blank) — sample pixels ────────────
  const ctx = cv.getContext('2d');
  // Sample left panel center: should NOT be the navy background pure color
  // (icons / labels overlay it, so pixel variance should exist)
  const imgData = ctx.getImageData(200, 600, 1, 1);
  const [r, g, b, a] = imgData.data;
  const hasContent = !(r === 21 && g === 46 && b === 88);  // not pure navy
  if (hasContent) {
    checks.push({ ok: true, label: 'キャンバスに描画コンテンツあり（非空白）' });
  } else {
    checks.push({ ok: false, label: 'キャンバスが空白（レンダリング未完了）' });
    ngCount++;
  }

  // ── QA 3: Text label length check — longest is "マイ申込状況" (7 chars) ──
  // We'll verify font size is within safe range for 1250px wide panel
  // At 155px font, 7 chars × ~150px ≈ 1050px < 1250px panel width → safe
  const longestLabel = 'マイ申込状況';
  const maxFontPx = 155;
  const estimatedWidth = longestLabel.length * maxFontPx * 0.95;  // ~0.95 em for Japanese
  const panelW = 1250;
  const safeMargin = 120 * 2;  // padding each side
  if (estimatedWidth < (panelW - safeMargin)) {
    checks.push({ ok: true, label: `最長ラベル「${longestLabel}」(${longestLabel.length}文字×${maxFontPx}px) 推定幅 ${Math.round(estimatedWidth)}px < 利用可能幅 ${panelW - safeMargin}px` });
  } else {
    checks.push({ ok: false, label: `ラベル幅超過リスク: ${Math.round(estimatedWidth)}px > ${panelW - safeMargin}px` });
    ngCount++;
  }

  // ── QA 4: Canvas measure API text width check ─────────────────────────────
  try {
    const measureCtx = cv.getContext('2d');
    measureCtx.font = `700 155px -apple-system, "Hiragino Sans", sans-serif`;
    const m = measureCtx.measureText('マイ申込状況');
    const mw = m.width;
    if (mw < 1010) {  // 1250 panel - 240 padding
      checks.push({ ok: true, label: `Canvas measureText「マイ申込状況」= ${Math.round(mw)}px (上限 1010px 以内)` });
    } else {
      checks.push({ ok: false, label: `テキスト幅超過: measureText = ${Math.round(mw)}px > 1010px` });
      ngCount++;
    }
  } catch(e) {
    checks.push({ ok: false, label: `measureText エラー: ${e.message}` });
    ngCount++;
  }

  // ── QA 5: Divider position check (left half ≠ right half) ────────────────
  // Sample pixel at exact divider x=1250 vs x=1249 (left side)
  const leftPx  = ctx.getImageData(400, 843, 1, 1).data;   // left panel center
  const rightPx = ctx.getImageData(2100, 843, 1, 1).data;  // right panel center
  // Both sides should render something (a>0 = opaque)
  if (leftPx[3] === 255 && rightPx[3] === 255) {
    checks.push({ ok: true, label: '左右パネル両方に描画あり（不透明）' });
  } else {
    checks.push({ ok: false, label: `パネル描画不備: left alpha=${leftPx[3]}, right alpha=${rightPx[3]}` });
    ngCount++;
  }

  // ── QA 6: Color contrast sanity (text #FFFFFF on navy #152E58) ───────────
  // Luminance of #152E58 = 0.024, #FFFFFF = 1.0 → ratio = (1+0.05)/(0.024+0.05) ≈ 14.2
  const contrastRatio = (1 + 0.05) / (0.024 + 0.05);
  if (contrastRatio >= 4.5) {
    checks.push({ ok: true, label: `コントラスト比 白/#152E58 ≈ ${contrastRatio.toFixed(1)}:1 (WCAG AA ≥4.5 クリア)` });
  } else {
    checks.push({ ok: false, label: `コントラスト不足: ${contrastRatio.toFixed(1)}:1 < 4.5` });
    ngCount++;
  }

  // ── Render overlay ─────────────────────────────────────────────────────────
  const passAll = ngCount === 0;
  overlay.className = passAll ? 'pass' : 'fail';
  title.textContent = passAll
    ? `QA 結果 ✅ NGゼロ（${checks.length} 項目 全PASS）`
    : `QA 結果 ❌ NG: ${ngCount} 件`;

  body.innerHTML = checks.map(c =>
    `<div class="qa-item ${c.ok ? 'qa-ok' : 'qa-ng'}">${c.ok ? '✅' : '❌'} ${c.label}</div>`
  ).join('');

  overlay.style.display = 'block';

  // Log to console
  console.log(`[QA] NG: ${ngCount}/${checks.length}`);
  checks.forEach(c => console.log(`  ${c.ok ? 'PASS' : 'FAIL'} — ${c.label}`));

  return ngCount;
}
</script>
</body>
</html>
