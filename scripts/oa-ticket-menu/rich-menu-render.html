<!DOCTYPE html>
<html lang="ja">
<head>

<title>LINE リッチメニュー — 秋田ノーザンハピネッツ チケット（ブランド公式カラー）</title>
<style data-critical>

<h1>秋田ノーザンハピネッツ — LINE チケットメニュー</h1>

<canvas id="export" width="2500" height="1686"></canvas>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// ハピネッツ公式ブランドトークン（brand-colors.md 2026-06-14 正本）
// ─────────────────────────────────────────────────────────────────────────────
const BRAND = {
  pink:       '#E40073',   // ハピネッツピンク（マゼンタ） — プライマリ
  black:      '#000000',   // ノーザンブラック
  gold:       '#BE8A23',   // いなほゴールド — アクセント
  white:      '#FFFFFF',
  bgBase:     '#0C0C0C',   // 漆黒ベース（スポーツ・ダークステージ感）
  bgPanel:    '#121212',
  pinkDim:    'rgba(228,0,115,0.10)',
  pinkGlow:   'rgba(228,0,115,0.22)',
  goldLine:   'rgba(190,138,35,0.60)',
  goldDim:    'rgba(190,138,35,0.14)',
  divider:    'rgba(255,255,255,0.16)',
  textSub:    'rgba(255,255,255,0.55)',
};

// ─────────────────────────────────────────────────────────────────────────────
// roundRect utility
// ─────────────────────────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─────────────────────────────────────────────────────────────────────────────
// drawBadge — ゴールドアクセント細線バッジ（上端装飾）
// ─────────────────────────────────────────────────────────────────────────────
function drawTopAccentBar(ctx, x, w, color, thickness = 14) {
  ctx.fillStyle = color;
  ctx.fillRect(x, 0, w, thickness);
}

// ─────────────────────────────────────────────────────────────────────────────
// drawDiagonalPattern — 斜めストライプ背景（スポーツ感）
// ─────────────────────────────────────────────────────────────────────────────
function drawDiagonalPattern(ctx, x, y, w, h, color) {
  ctx.save();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  const spacing = 80;
  for (let i = -h; i < w + h; i += spacing) {
    ctx.beginPath();
    ctx.moveTo(x + i, y);
    ctx.lineTo(x + i + h, y + h);
    ctx.stroke();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// drawTicketIcon — モノクロ線アイコン（itshoverスタイル）
// ─────────────────────────────────────────────────────────────────────────────
function drawTicketIcon(ctx, cx, cy, size, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = size * 0.055;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const tw = size * 0.88;
  const th = size * 0.56;
  const tx = cx - tw / 2;
  const ty = cy - th / 2;
  const notchR = th * 0.20;

  // メイン外枠
  ctx.strokeRect(tx, ty, tw, th);

  // 左ノッチ（半円くり抜き）
  ctx.beginPath();
  ctx.arc(tx, cy, notchR, -Math.PI / 2, Math.PI / 2, false);
  ctx.strokeStyle = color;
  ctx.stroke();

  // 右ノッチ
  ctx.beginPath();
  ctx.arc(tx + tw, cy, notchR, Math.PI / 2, -Math.PI / 2, false);
  ctx.stroke();

  // 破線区切り（縦）
  ctx.setLineDash([th * 0.09, th * 0.07]);
  ctx.beginPath();
  ctx.moveTo(tx + tw * 0.38, ty + th * 0.12);
  ctx.lineTo(tx + tw * 0.38, ty + th * 0.88);
  ctx.stroke();
  ctx.setLineDash([]);

  // 右エリア: 右向き三角形（CTA感）
  ctx.lineWidth = size * 0.045;
  const ax = cx + tw * 0.18;
  const arrowSize = th * 0.22;
  ctx.beginPath();
  ctx.moveTo(ax - arrowSize * 0.6, cy - arrowSize * 0.9);
  ctx.lineTo(ax + arrowSize * 0.6, cy);
  ctx.lineTo(ax - arrowSize * 0.6, cy + arrowSize * 0.9);
  ctx.stroke();

  // 左エリア: 横線3本（チケット番号感）
  ctx.lineWidth = size * 0.038;
  const lx1 = tx + tw * 0.06;
  const lx2 = tx + tw * 0.32;
  [cy - th * 0.22, cy, cy + th * 0.22].forEach(ly => {
    ctx.beginPath();
    ctx.moveTo(lx1, ly);
    ctx.lineTo(lx2, ly);
    ctx.stroke();
  });

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// drawClipboardIcon — モノクロ線アイコン（itshoverスタイル）
// ─────────────────────────────────────────────────────────────────────────────
function drawClipboardIcon(ctx, cx, cy, size, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = size * 0.055;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const bw = size * 0.72;
  const bh = size * 0.88;
  const bx = cx - bw / 2;
  const by = cy - bh / 2 + size * 0.08;
  const cr = bw * 0.08;

  // ボード本体
  roundRect(ctx, bx, by, bw, bh, cr);
  ctx.stroke();

  // クリップ（上部Uシェイプ）
  const clipW = bw * 0.40;
  const clipH = size * 0.20;
  const clipX = cx - clipW / 2;
  const clipY = by - clipH * 0.55;
  ctx.lineWidth = size * 0.05;
  roundRect(ctx, clipX, clipY, clipW, clipH, clipH / 2);
  ctx.stroke();

  // チェックリスト3行
  const lx1 = bx + bw * 0.14;
  const lx2 = bx + bw * 0.86;
  const ly0 = by + bh * 0.26;
  const gap = bh * 0.20;
  ctx.lineWidth = size * 0.045;

  for (let i = 0; i < 3; i++) {
    const ly = ly0 + gap * i;
    const cbS = bh * 0.10;

    // チェックボックス
    ctx.strokeRect(lx1, ly - cbS / 2, cbS, cbS);

    // 1行目だけチェックマーク
    if (i === 0) {
      ctx.lineWidth = size * 0.038;
      ctx.beginPath();
      ctx.moveTo(lx1 + cbS * 0.12, ly + cbS * 0.05);
      ctx.lineTo(lx1 + cbS * 0.42, ly + cbS * 0.28);
      ctx.lineTo(lx1 + cbS * 0.88, ly - cbS * 0.20);
      ctx.stroke();
      ctx.lineWidth = size * 0.045;
    }

    // テキスト横線
    const lineEnd = i === 2 ? lx2 - bw * 0.14 : lx2;
    ctx.beginPath();
    ctx.moveTo(lx1 + cbS + bw * 0.06, ly);
    ctx.lineTo(lineEnd, ly);
    ctx.stroke();
  }

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// drawPanel — 左右各パネル
// ─────────────────────────────────────────────────────────────────────────────
function drawPanel(ctx, { x, w, h, accent, accentDim, iconType, labelJa, labelEn, side }) {
  const cx = x + w / 2;
  const cy = h / 2;

  // ── ラジアルグロー（中央から広がる）
  const glow = ctx.createRadialGradient(cx, cy - 100, 0, cx, cy - 100, 700);
  glow.addColorStop(0, accentDim);
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(x, 0, w, h);

  // ── 斜めストライプ（背景テクスチャ。非常に淡い）
  drawDiagonalPattern(ctx, x, 0, w, h, 'rgba(255,255,255,0.022)');

  // ── 上端アクセントバー（メインカラー）
  ctx.fillStyle = accent;
  ctx.fillRect(x + 80, 0, w - 160, 12);

  // ── ゴールド細線（下端アクセント）
  ctx.fillStyle = BRAND.goldLine;
  ctx.fillRect(x + 60, h - 8, w - 120, 3);

  // ── アイコン描画（モノクロ線・単色）
  const iconSize = 300;
  const iconY = cy - 205;
  if (iconType === 'ticket') {
    drawTicketIcon(ctx, cx, iconY, iconSize, accent);
  } else {
    drawClipboardIcon(ctx, cx, iconY, iconSize, accent);
  }

  // ── 日本語ラベル（主テキスト）
  const jaSize = labelJa.length <= 4 ? 180 : labelJa.length <= 5 ? 165 : 148;
  ctx.font = `700 ${jaSize}px -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = BRAND.white;
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowBlur = 24;
  ctx.fillText(labelJa, cx, cy + 100);
  ctx.shadowBlur = 0;

  // ── 英語ラベル（サブテキスト）
  const enSize = 86;
  ctx.font = `500 ${enSize}px -apple-system, "Hiragino Sans", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = accent;
  ctx.globalAlpha = 0.90;
  ctx.fillText(labelEn, cx, cy + 220);
  ctx.globalAlpha = 1.0;

  // ── CTAボタン外枠
  const btnW = w - 260;
  const btnH = 148;
  const btnX = x + 130;
  const btnY = cy + 265;
  roundRect(ctx, btnX, btnY, btnW, btnH, 38);
  ctx.strokeStyle = accent;
  ctx.lineWidth = 5;
  ctx.globalAlpha = 0.65;
  ctx.stroke();
  ctx.globalAlpha = 1.0;

  // ── CTAボタン内: タップ矢印（右三角形）
  const arrCx = cx;
  const arrCy = btnY + btnH / 2;
  const arrS = 28;
  ctx.fillStyle = accent;
  ctx.globalAlpha = 0.80;
  ctx.beginPath();
  ctx.moveTo(arrCx - arrS * 0.7, arrCy - arrS);
  ctx.lineTo(arrCx + arrS * 0.9, arrCy);
  ctx.lineTo(arrCx - arrS * 0.7, arrCy + arrS);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1.0;
}

// ─────────────────────────────────────────────────────────────────────────────
// drawRichMenu — メインレンダラー
// ─────────────────────────────────────────────────────────────────────────────
function drawRichMenu(canvas) {
  const W = 2500;
  const H = 1686;
  const ctx = canvas.getContext('2d');

  // ── ベース背景（漆黒）
  ctx.fillStyle = BRAND.bgBase;
  ctx.fillRect(0, 0, W, H);

  // ── 微妙なパネル分け（左右で微差の背景）
  ctx.fillStyle = 'rgba(228,0,115,0.025)';
  ctx.fillRect(0, 0, W / 2, H);

  ctx.fillStyle = 'rgba(190,138,35,0.025)';
  ctx.fillRect(W / 2, 0, W / 2, H);

  // ── 中央分割線
  const divX = W / 2;
  ctx.strokeStyle = BRAND.divider;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(divX, 30);
  ctx.lineTo(divX, H - 30);
  ctx.stroke();

  // ── 中央分割線ゴールドアクセント（細）
  ctx.strokeStyle = BRAND.goldLine;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(divX, 0);
  ctx.lineTo(divX, H);
  ctx.stroke();

  // ── 左パネル: 予約する / Reserve（ピンク）
  drawPanel(ctx, {
    x: 0,
    w: divX,
    h: H,
    accent: BRAND.pink,
    accentDim: BRAND.pinkDim,
    iconType: 'ticket',
    labelJa: '予約する',
    labelEn: 'Reserve',
    side: 'left',
  });

  // ── 右パネル: マイ申込状況 / My Status（ゴールド）
  drawPanel(ctx, {
    x: divX,
    w: divX,
    h: H,
    accent: BRAND.gold,
    accentDim: BRAND.goldDim,
    iconType: 'clipboard',
    labelJa: 'マイ申込状況',
    labelEn: 'My Status',
    side: 'right',
  });

  // ── 下部ブランドフッター
  const footerH = 90;
  const footerGrad = ctx.createLinearGradient(0, H - footerH, 0, H);
  footerGrad.addColorStop(0, 'rgba(0,0,0,0)');
  footerGrad.addColorStop(1, 'rgba(0,0,0,0.75)');
  ctx.fillStyle = footerGrad;
  ctx.fillRect(0, H - footerH, W, footerH);

  // ブランド名テキスト
  ctx.font = '500 34px -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.40)';
  ctx.fillText('AKITA NORTHERN HAPPINETS', W / 2, H - 44);

  // ゴールドドット区切り
  ctx.fillStyle = BRAND.gold;
  ctx.globalAlpha = 0.55;
  ctx.beginPath();
  ctx.arc(W / 2 - 320, H - 44, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(W / 2 + 320, H - 44, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1.0;
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const preview = document.getElementById('preview');
  drawRichMenu(preview);
  setTimeout(runQA, 400);
});

// ─────────────────────────────────────────────────────────────────────────────
// ダウンロード（実サイズ 2500×1686）
// ─────────────────────────────────────────────────────────────────────────────
function downloadPNG() {
  const exportCanvas = document.getElementById('export');
  exportCanvas.width  = 2500;
  exportCanvas.height = 1686;
  drawRichMenu(exportCanvas);

  if (exportCanvas.width !== 2500 || exportCanvas.height !== 1686) {
    alert(`サイズ不一致: ${exportCanvas.width}×${exportCanvas.height}`);
    return;
  }

  exportCanvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'hapinets-ticket-menu-2500x1686.png';
    a.click();
    URL.revokeObjectURL(a.href);
  }, 'image/png');
}

// ─────────────────────────────────────────────────────────────────────────────
// 機械QA
// ─────────────────────────────────────────────────────────────────────────────
function runQA() {
  const overlay = document.getElementById('qa-overlay');
  const body    = document.getElementById('qa-body');
  const title   = document.getElementById('qa-title');
  const cv      = document.getElementById('preview');
  const ctx     = cv.getContext('2d');

  const checks = [];
  let ngCount = 0;

  function pass(label) { checks.push({ ok: true,  label }); }
  function fail(label) { checks.push({ ok: false, label }); ngCount++; }

  // QA1: 宣言サイズ == 2500×1686
  if (cv.width === 2500 && cv.height === 1686) {
    pass('宣言=実サイズ一致 (2500×1686)');
  } else {
    fail(`サイズ不一致: ${cv.width}×${cv.height} ≠ 2500×1686`);
  }

  // QA2: キャンバスに描画コンテンツ（非空白）
  const px = ctx.getImageData(200, 600, 1, 1).data;
  const isBlank = (px[0] < 15 && px[1] < 15 && px[2] < 15 && px[3] === 255);
  // 漆黒(#0C0C0C)より明るい描画があるか — 中央部分を確認
  const px2 = ctx.getImageData(625, 843, 1, 1).data;  // 左パネル中央
  const px3 = ctx.getImageData(1875, 843, 1, 1).data; // 右パネル中央
  const leftHasContent  = !(px2[0] < 15 && px2[1] < 15 && px2[2] < 15);
  const rightHasContent = !(px3[0] < 15 && px3[1] < 15 && px3[2] < 15);
  if (leftHasContent && rightHasContent) {
    pass('左右パネル両方に描画コンテンツあり');
  } else {
    fail(`描画不備: 左=${leftHasContent ? 'OK' : 'NG'}, 右=${rightHasContent ? 'OK' : 'NG'}`);
  }

  // QA3: 最長ラベル幅チェック（Canvas measureText）
  try {
    ctx.font = `700 148px -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif`;
    const mw = ctx.measureText('マイ申込状況').width;
    const maxW = 1250 - 260; // パネル幅 - 両側パディング
    if (mw < maxW) {
      pass(`measureText「マイ申込状況」= ${Math.round(mw)}px < 上限 ${maxW}px`);
    } else {
      fail(`テキスト幅超過: ${Math.round(mw)}px > ${maxW}px`);
    }
  } catch (e) {
    fail(`measureText エラー: ${e.message}`);
  }

  // QA4: 左パネルラベル幅チェック
  try {
    ctx.font = `700 165px -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif`;
    const mw = ctx.measureText('予約する').width;
    const maxW = 1250 - 260;
    if (mw < maxW) {
      pass(`measureText「予約する」= ${Math.round(mw)}px < 上限 ${maxW}px`);
    } else {
      fail(`テキスト幅超過(予約する): ${Math.round(mw)}px > ${maxW}px`);
    }
  } catch (e) {
    fail(`measureText エラー: ${e.message}`);
  }

  // QA5: コントラスト比 — 白テキスト on #0C0C0C
  // L(#0C0C0C) ≈ 0.002, L(#FFFFFF) = 1.0 → ratio = (1+0.05)/(0.002+0.05) ≈ 20.2
  const contrastRatio = (1.0 + 0.05) / (0.002 + 0.05);
  if (contrastRatio >= 4.5) {
    pass(`コントラスト比 白/#0C0C0C ≈ ${contrastRatio.toFixed(1)}:1 (WCAG AA 4.5 超)`);
  } else {
    fail(`コントラスト不足: ${contrastRatio.toFixed(1)}:1 < 4.5`);
  }

  // QA6: ピンクアイコン色がブランド正規値 #E40073 に一致 (r=228, g=0, b=115)
  // アクセントバー（上端）をサンプリング: x=300, y=5
  const accentPx = ctx.getImageData(300, 5, 1, 1).data;
  const pinkMatch = (accentPx[0] > 200 && accentPx[1] < 20 && accentPx[2] > 80);
  if (pinkMatch) {
    pass(`上端アクセントバーにハピネッツピンク (#E40073) を検出`);
  } else {
    fail(`ピンクアクセントバー未検出: rgb(${accentPx[0]},${accentPx[1]},${accentPx[2]})`);
  }

  // ── 結果描画
  const passAll = ngCount === 0;
  overlay.className = passAll ? 'pass' : 'fail';
  title.textContent = passAll
    ? `QA 結果 ✅ NGゼロ（${checks.length} 項目 全PASS）`
    : `QA 結果 ❌ NG: ${ngCount} 件`;

  body.innerHTML = checks.map(c =>
    `<div class="qa-item ${c.ok ? 'qa-ok' : 'qa-ng'}">${c.ok ? '✅' : '❌'} ${c.label}</div>`
  ).join('');

  overlay.style.display = 'block';

  console.log(`[QA] NG: ${ngCount}/${checks.length}`);
  checks.forEach(c => console.log(`  ${c.ok ? 'PASS' : 'FAIL'} — ${c.label}`));

  return ngCount;
}
</script>
</body>
</html>
